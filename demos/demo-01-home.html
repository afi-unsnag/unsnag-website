<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 01 — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    color: #2D2A26;
    overflow: hidden;
  }
  .phone-frame {
    width: 100%;
    height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    position: relative;
    box-shadow: none;
  }
  .phone-notch {
    width: 0; height: 0;
    background: #1a1a1a;
    display: none;
    margin: 0;
    position: relative;
    z-index: 10;
  }
  .phone-screen {
    background: var(--cream);
    border-radius: 0;
    overflow: hidden;
    
    position: relative;
    display: flex;
    flex-direction: column;
    
    
    padding: 40px 20px 0;
  height: 100vh; }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    
    
    width: 100%;
    padding-bottom: 80px;
  }
  .logo {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 48px;
    font-weight: 800;
    color: var(--warm-dark);
    text-align: center;
  }
  .accent-line {
    width: 48px; height: 4px;
    background: var(--mauve);
    border-radius: 2px;
    margin: 8px auto 32px;
  }
  .greeting, .question {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    color: var(--warm-dark-light);
    text-align: center;
    line-height: 1.4;
  }
  .greeting { margin-bottom: 4px; }
  .question { margin-bottom: 32px; }
  .cta-btn {
    width: calc(100% - 40px);
    padding: 20px;
    background: var(--mauve);
    border: 3px solid var(--warm-dark);
    border-radius: 12px;
    box-shadow: 4px 4px 0px 0px var(--warm-dark);
    font-family: 'Bricolage Grotesque', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--warm-dark-light);
    cursor: pointer;
    text-align: center;
    transition: box-shadow 0.1s, transform 0.1s;
  }
  .cta-btn.pressed {
    box-shadow: 1px 1px 0px 0px var(--warm-dark);
    transform: translate(3px, 3px);
  }
  .footnote {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--warm-dark-light);
    opacity: 0.5;
    text-align: center;
    line-height: 1.5;
    margin-top: 24px;
    max-width: 280px;
  }
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    border-top: 2px solid var(--warm-dark);
    background: var(--cream);
    display: flex;
    justify-content: space-around;
    
    border-radius: 0 0 36px 36px;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    
    gap: 2px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: var(--warm-dark-light);
  }
  .nav-label.active {
    font-weight: 600;
  }
  .screen-fade {
    opacity: 0;
    animation: screenFadeIn 600ms ease forwards;
  }
  @keyframes screenFadeIn {
    to { opacity: 1; }
  }
  .cursor {
    position: absolute;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  .cursor svg { display: block; transition: transform 0.1s; }
  .cursor.tap svg { transform: scale(0.85); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen" id="screen">
    <div class="content screen-fade" id="screenContent">
      <div class="logo">unsnag</div>
      <div class="accent-line"></div>
      <div class="greeting">&#x1F44B; Hey, Afi!</div>
      <div class="question">Feeling stuck?</div>
      <div class="cta-btn" id="ctaBtn">Let's move through it</div>
      <div class="footnote">Every time you use Unsnag, you're building a new default response.</div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" fill="#E2C6FD" stroke="#E2C6FD"/>
        </svg>
        <span class="nav-label active" style="color:#E2C6FD">Home</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="nav-label">History</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span class="nav-label">Saved</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </div>
    </div>
  </div>
  <div class="cursor" id="cursor">
    <svg width="17" height="23" viewBox="0 0 17 23" fill="none">
      <path d="M1 1L1 19.5L5.5 15L10 22L13 20.5L8.5 13.5L14.5 13.5L1 1Z" fill="white" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ctaBtn = document.getElementById('ctaBtn');
const screenContent = document.getElementById('screenContent');

function moveCursor(x, y, duration = 700) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1), opacity 0.3s`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, duration);
  });
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animate() {
  // Reset
  screenContent.style.opacity = '0';
  cursor.style.transition = 'none';
  cursor.style.left = '260px';
  cursor.style.top = '500px';
  cursor.style.opacity = '0';
  ctaBtn.classList.remove('pressed');
  await wait(100);

  // Fade in screen
  screenContent.style.transition = 'opacity 600ms ease';
  screenContent.style.opacity = '1';
  await wait(1000);

  // Show cursor
  cursor.style.opacity = '1';
  await wait(300);

  // Move to CTA
  const frameRect = document.querySelector('.phone-frame').getBoundingClientRect();
  const btnRect = ctaBtn.getBoundingClientRect();
  const btnX = btnRect.left - frameRect.left + btnRect.width / 2;
  const btnY = btnRect.top - frameRect.top + btnRect.height / 2;
  await moveCursor(btnX, btnY, 700);
  await wait(400);

  // Tap
  cursor.classList.add('tap');
  ctaBtn.classList.add('pressed');
  await wait(150);
  cursor.classList.remove('tap');
  ctaBtn.classList.remove('pressed');
  await wait(600);

  // Fade out everything
  screenContent.style.transition = 'opacity 300ms ease';
  screenContent.style.opacity = '0';
  cursor.style.opacity = '0';
  await wait(800);
}

async function loop() {
  while (true) {
    await animate();
    await wait(800);
  }
}
loop();
</script>
</body>
</html>
