<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 06 — Notice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    color: #2D2A26;
    overflow: hidden;
  }
  .phone-frame {
    width: 100%;
    height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    position: relative;
    box-shadow: none;
  }
  .phone-notch {
    width: 0; height: 0;
    background: #1a1a1a;
    display: none;
    margin: 0;
    position: relative; z-index: 10;
  }
  .phone-screen {
    background: var(--cream);
    border-radius: 0;
    overflow: hidden;
    
    position: relative;
    display: flex;
    flex-direction: column;
  height: 100vh; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    
    padding: 16px 16px 0;
    margin-bottom: 24px;
  }
  .top-btn {
    width: 36px; height: 36px;
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 8px;
    display: flex;
    
    
  }
  .top-btn svg { width: 18px; height: 18px; }
  .progress-dots {
    display: flex;
    gap: 12px;
    
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--warm-gray-light);
    background: transparent;
  }
  .dot.filled {
    background: var(--warm-dark);
    border-color: var(--warm-dark);
  }
  .dot.current {
    width: 14px; height: 14px;
    background: var(--mauve);
    border: 2px solid var(--warm-dark);
    position: relative;
  }
  .dot.current::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--mauve);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { width: 14px; height: 14px; opacity: 1; }
    100% { width: 24px; height: 24px; opacity: 0; }
  }
  .step-content {
    padding: 32px 20px 20px;
    display: flex;
    flex-direction: column;
    
    flex: 1;
  }
  .step-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 8px;
  }
  .heading {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--warm-dark);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .subtext {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.4;
  }
  .timer-area {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    
    
    margin: 0 auto 32px;
  }
  .timer-glow {
    position: absolute;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(226,198,253,0.15);
  }
  .timer-inner {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(226,198,253,0.25);
    border: 2px solid var(--mauve-dark);
    display: flex;
    
    
  }
  .timer-text {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--warm-dark-light);
    z-index: 2;
  }
  .pulse-ring-1, .pulse-ring-2 {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid var(--mauve);
    animation: breathe 5s ease-in-out infinite;
    pointer-events: none;
  }
  .pulse-ring-1 {
    width: 120px; height: 120px;
  }
  .pulse-ring-2 {
    width: 120px; height: 120px;
    animation-delay: 2.5s;
  }
  @keyframes breathe {
    0% { width: 120px; height: 120px; opacity: 0.6; }
    50% { width: 180px; height: 180px; opacity: 0; }
    100% { width: 120px; height: 120px; opacity: 0; }
  }
  .mute-link {
    display: flex;
    
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--warm-dark-light);
    margin-bottom: 16px;
  }
  .mute-link svg { width: 16px; height: 16px; }
  .skip-link {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--warm-dark-light);
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="top-bar">
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="progress-dots">
        <div class="dot filled"></div>
        <div class="dot filled"></div>
        <div class="dot filled"></div>
        <div class="dot current"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="step-content">
      <div class="step-label">NOTICE</div>
      <div class="heading">Just feel it. Don't fix it.</div>
      <div class="subtext">A feeling fully felt lasts about 90 seconds. That's all this is.</div>
      <div class="timer-area">
        <div class="timer-glow"></div>
        <div class="pulse-ring-1"></div>
        <div class="pulse-ring-2"></div>
        <div class="timer-inner">
          <div class="timer-text" id="timerText">1:30</div>
        </div>
      </div>
      <div class="mute-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        Mute
      </div>
      <div class="skip-link">Skip the rest — I'm ready</div>
    </div>
  </div>
</div>

<script>
const timerText = document.getElementById('timerText');

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function formatTime(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return m + ':' + String(s).padStart(2, '0');
}

async function animate() {
  let seconds = 90; // 1:30
  timerText.textContent = formatTime(seconds);
  await wait(500);

  // Count down: show ~8 seconds real time, 1:30 to 1:22
  for (let i = 0; i < 8; i++) {
    await wait(1000);
    seconds--;
    timerText.textContent = formatTime(seconds);
  }

  // Fade out
  const screen = document.querySelector('.phone-screen');
  screen.style.transition = 'opacity 300ms';
  screen.style.opacity = '0';
  await wait(800);
  screen.style.transition = 'none';
  screen.style.opacity = '1';
}

async function loop() {
  while (true) {
    await animate();
    await wait(800);
  }
}
loop();
</script>
</body>
</html>
