<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 06 — Notice</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
  }

  .phone-frame {
    width: 320px;
    background: #1a1a1a;
    border-radius: 44px;
    padding: 12px;
    position: relative;
  }

  .phone-notch {
    width: 100px;
    height: 28px;
    background: #1a1a1a;
    border-radius: 0 0 18px 18px;
    margin: 0 auto 8px;
    position: relative;
    z-index: 10;
  }

  .phone-screen {
    background: var(--cream);
    border-radius: 36px;
    overflow: hidden;
    min-height: 580px;
    position: relative;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }
  .progress-dots .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--warm-gray-light);
  }
  .progress-dots .dot.filled {
    background: var(--warm-dark);
  }
  .progress-dots .dot.active {
    background: var(--mauve);
    box-shadow: 0 0 0 3px rgba(226, 198, 253, 0.35);
  }

  /* Step label */
  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 12px;
  }

  /* Heading */
  .heading {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--warm-dark);
    text-align: center;
    line-height: 1.35;
    margin-bottom: 8px;
  }

  /* Subtext */
  .subtext {
    font-size: 13px;
    color: var(--warm-dark-light);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 40px;
    max-width: 220px;
  }

  /* Timer area */
  .timer-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    margin-bottom: 20px;
  }

  .timer-container {
    position: relative;
    width: 152px;
    height: 152px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1.0); }
    50% { transform: scale(1.03); }
  }

  .timer-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #FFDDD0;
    border: 3px solid var(--tomato);
    box-shadow: 0 0 0 16px rgba(255, 107, 76, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .timer-text {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--warm-dark);
  }

  /* SVG progress ring */
  .progress-ring {
    position: absolute;
    top: 0;
    left: 0;
    width: 152px;
    height: 152px;
    z-index: 1;
    transform: rotate(-90deg);
  }

  .progress-ring-bg {
    fill: none;
    stroke: rgba(255, 107, 76, 0.1);
    stroke-width: 3;
  }

  .progress-ring-fill {
    fill: none;
    stroke: var(--tomato);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1s linear;
  }

  /* Instruction text below timer */
  .instruction {
    font-size: 12px;
    color: var(--warm-dark-light);
    text-align: center;
    line-height: 1.5;
    margin-top: 32px;
    max-width: 200px;
  }

  /* Fade wrapper */
  .screen-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    opacity: 0;
    animation: screenLife 13s ease-in-out infinite;
  }

  @keyframes screenLife {
    0%       { opacity: 0; }
    5%       { opacity: 1; }
    88%      { opacity: 1; }
    97%      { opacity: 0; }
    100%     { opacity: 0; }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="screen-content">

      <div class="progress-dots">
        <div class="dot filled"></div>
        <div class="dot filled"></div>
        <div class="dot filled"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="step-label">Notice</div>

      <div class="heading">Just feel it. Don't fix it.</div>

      <div class="subtext">A feeling fully felt lasts about 90 seconds.</div>

      <div class="timer-area">
        <div class="timer-container">
          <svg class="progress-ring" viewBox="0 0 152 152">
            <circle class="progress-ring-bg" cx="76" cy="76" r="70" />
            <circle class="progress-ring-fill" cx="76" cy="76" r="70" />
          </svg>
          <div class="timer-circle">
            <div class="timer-text" id="timer">1:30</div>
          </div>
        </div>

        <div class="instruction">Focus on what you just named.<br>Let it be here.</div>
      </div>

    </div>
  </div>
</div>

<script>
  const TOTAL_SECONDS = 90;
  const COUNTDOWN_TICKS = 12;
  const LOOP_DURATION = 13000;
  const FADE_IN_DELAY = 650;

  const timerEl = document.getElementById('timer');
  const ringFill = document.querySelector('.progress-ring-fill');
  const circumference = 2 * Math.PI * 70; // ~440

  ringFill.style.strokeDasharray = circumference;
  ringFill.style.strokeDashoffset = circumference;

  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function runCycle() {
    let currentSecond = TOTAL_SECONDS;
    let ticks = 0;

    timerEl.textContent = formatTime(currentSecond);
    ringFill.style.transition = 'none';
    ringFill.style.strokeDashoffset = circumference;

    // Force reflow so transition reset takes effect
    ringFill.getBoundingClientRect();

    setTimeout(() => {
      ringFill.style.transition = 'stroke-dashoffset 1s linear';
    }, 50);

    const interval = setInterval(() => {
      ticks++;
      if (ticks > COUNTDOWN_TICKS) {
        clearInterval(interval);
        return;
      }
      currentSecond--;
      timerEl.textContent = formatTime(currentSecond);

      // Progress ring: how far through 90s are we?
      const elapsed = TOTAL_SECONDS - currentSecond;
      const progress = elapsed / TOTAL_SECONDS;
      const offset = circumference * (1 - progress);
      ringFill.style.strokeDashoffset = offset;
    }, 1000);
  }

  // Initial run after fade-in
  setTimeout(runCycle, FADE_IN_DELAY);

  // Loop
  setInterval(() => {
    setTimeout(runCycle, FADE_IN_DELAY);
  }, LOOP_DURATION);
</script>

</body>
</html>
