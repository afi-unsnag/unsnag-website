<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 02 — Unload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    color: #2D2A26;
    overflow: hidden;
  }
  .phone-frame {
    width: 100%;
    height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    position: relative;
    box-shadow: none;
  }
  .phone-notch {
    width: 0; height: 0;
    background: #1a1a1a;
    display: none;
    margin: 0;
    position: relative; z-index: 10;
  }
  .phone-screen {
    background: var(--cream);
    border-radius: 0;
    overflow: hidden;
    
    position: relative;
    display: flex;
    flex-direction: column;
  height: 100vh; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    
    padding: 16px 16px 0;
    margin-bottom: 24px;
  }
  .top-btn {
    width: 36px; height: 36px;
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 8px;
    display: flex;
    
    
  }
  .top-btn svg { width: 18px; height: 18px; }
  .top-bar-center { flex: 1; }
  .step-content {
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .step-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 8px;
  }
  .heading {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--warm-dark);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .subtext {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.4;
  }
  .textarea-wrap {
    position: relative;
    margin-bottom: 16px;
    flex: 1;
  }
  .textarea {
    width: 100%;
    min-height: 180px;
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 12px;
    padding: 14px 52px 56px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--warm-dark-light);
    line-height: 1.5;
  }
  .textarea-placeholder {
    position: absolute;
    top: 14px; left: 14px; right: 56px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--warm-gray);
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .mic-btn {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 44px; height: 44px;
    background: var(--mauve);
    border: 3px solid var(--warm-dark);
    border-radius: 50%;
    box-shadow: 2px 2px 0 0 var(--warm-dark);
    display: flex;
    
    
  }
  .mic-btn svg { width: 18px; height: 18px; }
  .cta-btn {
    width: 100%;
    padding: 14px;
    background: var(--mauve);
    border: 3px solid var(--warm-dark);
    border-radius: 12px;
    box-shadow: 3px 3px 0 0 var(--warm-dark);
    font-family: 'Bricolage Grotesque', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--warm-dark-light);
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s, box-shadow 0.1s;
  }
  .cta-btn.visible { opacity: 1; transform: translateY(0); }
  .cta-btn.pressed {
    box-shadow: 1px 1px 0 0 var(--warm-dark);
    transform: translate(2px, 2px);
  }
  .text-cursor {
    display: inline-block;
    width: 2px; height: 16px;
    background: var(--warm-dark);
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .cursor {
    position: absolute;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  .cursor svg { display: block; transition: transform 0.1s; }
  .cursor.tap svg { transform: scale(0.85); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="top-bar">
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="top-bar-center"></div>
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="step-content">
      <div class="step-label">UNLOAD</div>
      <div class="heading">What's going on right now?</div>
      <div class="subtext">No filter. Just dump it.</div>
      <div class="textarea-wrap">
        <div class="textarea" id="textarea"></div>
        <div class="textarea-placeholder" id="placeholder">Type here, or tap the mic to speak…</div>
        <div class="mic-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="1" width="6" height="11" rx="3"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </div>
      <div class="cta-btn" id="ctaBtn">Continue</div>
    </div>
  </div>
  <div class="cursor" id="cursor">
    <svg width="17" height="23" viewBox="0 0 17 23" fill="none">
      <path d="M1 1L1 19.5L5.5 15L10 22L13 20.5L8.5 13.5L14.5 13.5L1 1Z" fill="white" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const textarea = document.getElementById('textarea');
const placeholder = document.getElementById('placeholder');
const ctaBtn = document.getElementById('ctaBtn');
const fullText = "he hasn't texted back in 3 hours and I already know he's mad at me. I don't even know what I did but I keep going over everything I said yesterday and I just want to ask him what's wrong but I know I'll sound needy and desperate";

function moveCursor(x, y, duration = 700) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1), opacity 0.3s`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, duration);
  });
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(text) {
  placeholder.style.opacity = '0';
  for (let i = 0; i < text.length; i++) {
    textarea.innerHTML = text.slice(0, i + 1) + '<span class="text-cursor"></span>';
    await wait(35 + Math.random() * 10);
  }
}

async function animate() {
  textarea.innerHTML = '';
  placeholder.style.opacity = '1';
  ctaBtn.classList.remove('visible', 'pressed');
  cursor.style.transition = 'none';
  cursor.style.left = '260px';
  cursor.style.top = '520px';
  cursor.style.opacity = '0';
  await wait(100);

  cursor.style.opacity = '1';
  await wait(300);

  // Move to textarea
  await moveCursor(100, 280, 700);
  await wait(400);

  // Tap textarea
  cursor.classList.add('tap');
  await wait(150);
  cursor.classList.remove('tap');

  cursor.style.opacity = '0';
  await wait(200);

  await typeText(fullText);
  await wait(400);

  // Show continue
  ctaBtn.classList.add('visible');
  await wait(400);

  // Move to button
  cursor.style.opacity = '1';
  const frameRect = document.querySelector('.phone-frame').getBoundingClientRect();
  const btnRect = ctaBtn.getBoundingClientRect();
  await moveCursor(btnRect.left - frameRect.left + btnRect.width/2, btnRect.top - frameRect.top + btnRect.height/2, 700);
  await wait(400);

  // Tap
  cursor.classList.add('tap');
  ctaBtn.classList.add('pressed');
  await wait(150);
  cursor.classList.remove('tap');
  ctaBtn.classList.remove('pressed');
  await wait(400);

  // Fade out
  cursor.style.opacity = '0';
  const screen = document.querySelector('.phone-screen');
  screen.style.transition = 'opacity 300ms';
  screen.style.opacity = '0';
  await wait(800);
  screen.style.transition = 'none';
  screen.style.opacity = '1';
}

async function loop() {
  while (true) {
    await animate();
    await wait(800);
  }
}
loop();
</script>
</body>
</html>
