<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 03 — AI Reflection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    color: #2D2A26;
    overflow: hidden;
  }
  .phone-frame {
    width: 100%;
    height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    position: relative;
    box-shadow: none;
  }
  .phone-notch {
    width: 0; height: 0;
    background: #1a1a1a;
    display: none;
    margin: 0;
    position: relative; z-index: 10;
  }
  .phone-screen {
    background: var(--cream);
    border-radius: 0;
    overflow: hidden;
    
    position: relative;
    display: flex;
    flex-direction: column;
  height: 100vh; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    
    padding: 16px 16px 0;
    margin-bottom: 24px;
  }
  .top-btn {
    width: 36px; height: 36px;
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 8px;
    display: flex;
    
    
  }
  .top-btn svg { width: 18px; height: 18px; }
  .progress-dots {
    display: flex;
    gap: 12px;
    
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--warm-gray-light);
    background: transparent;
  }
  .dot.filled {
    background: var(--warm-dark);
    border-color: var(--warm-dark);
  }
  .dot.current {
    width: 14px; height: 14px;
    background: var(--mauve);
    border: 2px solid var(--warm-dark);
    position: relative;
  }
  .dot.current::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--mauve);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { width: 14px; height: 14px; opacity: 1; }
    100% { width: 24px; height: 24px; opacity: 0; }
  }
  .step-content {
    padding: 32px 20px 20px;
    display: flex;
    flex-direction: column;
    
    flex: 1;
  }
  .ai-badge {
    display: inline-flex;
    
    gap: 4px;
    background: var(--mauve-light);
    border: 1px solid var(--mauve-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--warm-dark-light);
    margin-bottom: 12px;
  }
  .heading {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--warm-dark);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 24px;
  }
  .body-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--warm-dark-light);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 40px;
    padding: 0 4px;
  }
  .body-line {
    opacity: 0;
    transition: opacity 400ms ease;
  }
  .body-line.visible { opacity: 1; }
  .cta-btn {
    width: 100%;
    max-width: 280px;
    padding: 16px;
    background: var(--mauve);
    border: 3px solid var(--warm-dark);
    border-radius: 12px;
    box-shadow: 3px 3px 0 0 var(--warm-dark);
    font-family: 'Bricolage Grotesque', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--warm-dark-light);
    text-align: center;
    transition: box-shadow 0.1s, transform 0.1s;
    margin-top: auto;
  }
  .cta-btn.pressed {
    box-shadow: 1px 1px 0 0 var(--warm-dark);
    transform: translate(2px, 2px);
  }
  .cursor {
    position: absolute;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  .cursor svg { display: block; transition: transform 0.1s; }
  .cursor.tap svg { transform: scale(0.85); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="top-bar">
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="progress-dots">
        <div class="dot current"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="step-content">
      <div class="ai-badge">&#x2726; AI</div>
      <div class="heading">Of course this is hard.</div>
      <div class="body-text" id="bodyText">
        <span class="body-line" id="line1">There's something quietly exhausting about saying the true thing </span>
        <span class="body-line" id="line2">and then having to manage the fallout from having said it. </span>
        <span class="body-line" id="line3">You don't have to earn your way back from honesty right now.</span>
      </div>
      <div class="cta-btn" id="ctaBtn">continue</div>
    </div>
  </div>
  <div class="cursor" id="cursor">
    <svg width="17" height="23" viewBox="0 0 17 23" fill="none">
      <path d="M1 1L1 19.5L5.5 15L10 22L13 20.5L8.5 13.5L14.5 13.5L1 1Z" fill="white" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ctaBtn = document.getElementById('ctaBtn');
const lines = [document.getElementById('line1'), document.getElementById('line2'), document.getElementById('line3')];

function moveCursor(x, y, duration = 700) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1), opacity 0.3s`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, duration);
  });
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animate() {
  // Reset
  lines.forEach(l => l.classList.remove('visible'));
  ctaBtn.classList.remove('pressed');
  cursor.style.transition = 'none';
  cursor.style.left = '260px';
  cursor.style.top = '500px';
  cursor.style.opacity = '0';
  await wait(500);

  // Fade in lines
  for (let i = 0; i < lines.length; i++) {
    lines[i].classList.add('visible');
    await wait(400);
  }

  await wait(1500);

  // Show cursor and move to button
  cursor.style.opacity = '1';
  await wait(300);
  const frameRect = document.querySelector('.phone-frame').getBoundingClientRect();
  const btnRect = ctaBtn.getBoundingClientRect();
  await moveCursor(btnRect.left - frameRect.left + btnRect.width/2, btnRect.top - frameRect.top + btnRect.height/2, 700);
  await wait(400);

  // Tap
  cursor.classList.add('tap');
  ctaBtn.classList.add('pressed');
  await wait(150);
  cursor.classList.remove('tap');
  ctaBtn.classList.remove('pressed');
  await wait(400);

  // Fade out
  cursor.style.opacity = '0';
  const screen = document.querySelector('.phone-screen');
  screen.style.transition = 'opacity 300ms';
  screen.style.opacity = '0';
  await wait(800);
  screen.style.transition = 'none';
  screen.style.opacity = '1';
}

async function loop() {
  while (true) {
    await animate();
    await wait(800);
  }
}
loop();
</script>
</body>
</html>
