<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsnag Demo 04 — Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --cream-dark: #F0EBE3;
    --warm-dark: #2D2A26;
    --warm-dark-light: #4A4640;
    --mauve: #E2C6FD;
    --mauve-dark: #C9A4E8;
    --mauve-light: #F0DEFF;
    --tomato: #FF6B4C;
    --orange: #FFA846;
    --warm-gray: #B8B2A8;
    --warm-gray-light: #E8E3DB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
    color: #2D2A26;
    overflow: hidden;
  }
  .phone-frame {
    width: 100%;
    height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    position: relative;
    box-shadow: none;
  }
  .phone-notch {
    width: 0; height: 0;
    background: #1a1a1a;
    display: none;
    margin: 0;
    position: relative; z-index: 10;
  }
  .phone-screen {
    background: var(--cream);
    border-radius: 0;
    overflow: hidden;
    
    
    position: relative;
    display: flex;
    flex-direction: column;
  height: 100vh; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    
    padding: 16px 16px 0;
    margin-bottom: 24px;
    flex-shrink: 0;
  }
  .top-btn {
    width: 36px; height: 36px;
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 8px;
    display: flex;
    
    
  }
  .top-btn svg { width: 18px; height: 18px; }
  .progress-dots {
    display: flex;
    gap: 12px;
    
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--warm-gray-light);
    background: transparent;
  }
  .dot.filled {
    background: var(--warm-dark);
    border-color: var(--warm-dark);
  }
  .dot.current {
    width: 14px; height: 14px;
    background: var(--mauve);
    border: 2px solid var(--warm-dark);
    position: relative;
  }
  .dot.current::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--mauve);
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { width: 14px; height: 14px; opacity: 1; }
    100% { width: 24px; height: 24px; opacity: 0; }
  }
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }
  .step-content {
    padding: 32px 20px 20px;
    display: flex;
    flex-direction: column;
    
  }
  .step-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 8px;
  }
  .heading {
    font-family: 'Bricolage Grotesque', serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--warm-dark);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .subtext {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .helper {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--warm-dark-light);
    text-align: center;
    margin-bottom: 16px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    
    gap: 8px;
    margin-bottom: 24px;
  }
  .chip {
    background: var(--cream-dark);
    border: 2px solid var(--warm-gray-light);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--warm-dark-light);
    transition: all 0.15s;
  }
  .chip.selected {
    background: var(--tomato);
    border-color: var(--warm-dark);
    color: var(--cream);
    box-shadow: 2px 2px 0 0 var(--warm-dark);
  }
  .cta-btn {
    width: 100%;
    max-width: 280px;
    padding: 16px;
    background: var(--mauve);
    border: 3px solid var(--warm-dark);
    border-radius: 12px;
    box-shadow: 3px 3px 0 0 var(--warm-dark);
    font-family: 'Bricolage Grotesque', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--warm-dark-light);
    text-align: center;
    transition: box-shadow 0.1s, transform 0.1s;
    margin-bottom: 20px;
  }
  .cta-btn.pressed {
    box-shadow: 1px 1px 0 0 var(--warm-dark);
    transform: translate(2px, 2px);
  }
  .cursor {
    position: absolute;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  .cursor svg { display: block; transition: transform 0.1s; }
  .cursor.tap svg { transform: scale(0.85); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="top-bar">
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
      <div class="progress-dots">
        <div class="dot filled"></div>
        <div class="dot current"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="top-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4A4640" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div class="scroll-area" id="scrollArea">
      <div class="step-content">
        <div class="step-label">NAME</div>
        <div class="heading">What are you feeling right now?</div>
        <div class="subtext">Naming it actually turns the volume down.</div>
        <div class="helper">Tap anything that fits.</div>
        <div class="chips" id="chips">
          <div class="chip" data-name="anxious">anxious</div>
          <div class="chip" data-name="guilty">guilty</div>
          <div class="chip" data-name="overwhelmed">overwhelmed</div>
          <div class="chip" data-name="frustrated">frustrated</div>
          <div class="chip" data-name="sad">sad</div>
          <div class="chip" data-name="angry">angry</div>
          <div class="chip" data-name="numb">numb</div>
          <div class="chip" data-name="confused">confused</div>
          <div class="chip" data-name="ashamed">ashamed</div>
          <div class="chip" data-name="scared">scared</div>
          <div class="chip" data-name="lonely">lonely</div>
          <div class="chip" data-name="jealous">jealous</div>
          <div class="chip" data-name="insecure">insecure</div>
          <div class="chip" data-name="resentful">resentful</div>
          <div class="chip" data-name="panicked">panicked</div>
          <div class="chip" data-name="disappointed">disappointed</div>
          <div class="chip" data-name="helpless">helpless</div>
          <div class="chip" data-name="rejected">rejected</div>
          <div class="chip" data-name="stuck">stuck</div>
          <div class="chip" data-name="drained">drained</div>
          <div class="chip" data-name="invisible">invisible</div>
        </div>
        <div class="cta-btn" id="ctaBtn">continue</div>
      </div>
    </div>
  </div>
  <div class="cursor" id="cursor">
    <svg width="17" height="23" viewBox="0 0 17 23" fill="none">
      <path d="M1 1L1 19.5L5.5 15L10 22L13 20.5L8.5 13.5L14.5 13.5L1 1Z" fill="white" stroke="#2D2A26" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ctaBtn = document.getElementById('ctaBtn');
const scrollArea = document.getElementById('scrollArea');
const chips = document.querySelectorAll('.chip');

function getChip(name) {
  return document.querySelector(`.chip[data-name="${name}"]`);
}

function moveCursor(x, y, duration = 700) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1), opacity 0.3s`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, duration);
  });
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function getPos(el) {
  const frameRect = document.querySelector('.phone-frame').getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return { x: r.left - frameRect.left + r.width/2, y: r.top - frameRect.top + r.height/2 };
}

async function tapChip(name) {
  const chip = getChip(name);
  const pos = getPos(chip);
  await moveCursor(pos.x, pos.y, 700);
  await wait(400);
  cursor.classList.add('tap');
  chip.classList.add('selected');
  await wait(150);
  cursor.classList.remove('tap');
}

async function animate() {
  // Reset
  chips.forEach(c => c.classList.remove('selected'));
  ctaBtn.classList.remove('pressed');
  scrollArea.scrollTop = 0;
  cursor.style.transition = 'none';
  cursor.style.left = '260px';
  cursor.style.top = '500px';
  cursor.style.opacity = '0';
  await wait(500);

  cursor.style.opacity = '1';
  await wait(300);

  // Scroll slightly
  scrollArea.scrollTo({ top: 30, behavior: 'smooth' });
  await wait(600);

  // Select chips
  await tapChip('anxious');
  await wait(300);
  await tapChip('overwhelmed');
  await wait(300);
  await tapChip('frustrated');
  await wait(500);

  // Scroll down to button
  scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
  await wait(600);

  // Tap continue
  const btnPos = getPos(ctaBtn);
  await moveCursor(btnPos.x, btnPos.y, 700);
  await wait(400);
  cursor.classList.add('tap');
  ctaBtn.classList.add('pressed');
  await wait(150);
  cursor.classList.remove('tap');
  ctaBtn.classList.remove('pressed');
  await wait(400);

  // Fade out
  cursor.style.opacity = '0';
  const screen = document.querySelector('.phone-screen');
  screen.style.transition = 'opacity 300ms';
  screen.style.opacity = '0';
  await wait(800);
  screen.style.transition = 'none';
  screen.style.opacity = '1';
}

async function loop() {
  while (true) {
    await animate();
    await wait(800);
  }
}
loop();
</script>
</body>
</html>
