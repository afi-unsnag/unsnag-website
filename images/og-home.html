<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 80px 40px;
    background: #FAF7F2;
    position: relative;
  }
  .accent-bar {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 8px;
    background: #E2C6FD;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 8px 20px;
    border-radius: 100px;
    background: #FFBCF2;
    border: 2px solid #2D2A26;
    box-shadow: 2px 2px 0px 0px #2D2A26;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    color: #2D2A26;
    margin-bottom: 24px;
  }
  .logo {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 72px;
    color: #2D2A26;
    letter-spacing: -2px;
    margin-bottom: 12px;
  }
  .tagline {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 32px;
    color: #2D2A26;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    color: #4A4640;
    text-align: center;
    line-height: 1.5;
    max-width: 700px;
  }
  .bottom {
    margin-top: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .cta {
    padding: 14px 32px;
    background: #E2C6FD;
    border: 2px solid #2D2A26;
    border-radius: 12px;
    box-shadow: 3px 3px 0px 0px #2D2A26;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 600;
    color: #2D2A26;
  }
  .url {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    color: #B8B2A8;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="logo">unsnag</div>
  <div class="tagline">Finally, a simple way to stop overthinking.</div>
  <div class="sub">A guided app for people who overthink everything, care too much about other people's opinions, and are exhausted from holding it all together.</div>
  <div class="bottom">
    <div class="cta">Start free. 14 days on us.</div>
    <div class="url">unsnag.co</div>
  </div>
</body>
</html>
