<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px 88px; background: #FAF7F2; position: relative;
  }
  .accent-bar { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: #E2C6FD; }
  .title {
    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
    font-size: 56px; line-height: 1.08; letter-spacing: -2px; color: #2D2A26; max-width: 920px;
  }
  .bottom {
    position: absolute; bottom: 52px; left: 88px; right: 88px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .wordmark { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 26px; color: #2D2A26; }
  .url { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 16px; color: #B8B2A8; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <h1 class="title">You can't turn down pain without turning down joy, too.</h1>
  <div class="bottom">
    <span class="wordmark">unsnag</span>
    <span class="url">unsnag.co/blog</span>
  </div>
</body>
</html>
