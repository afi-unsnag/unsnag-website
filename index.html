<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsnag — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:            #FAF7F2;
      --warm-dark:        #2D2A26;
      --warm-dark-light:  #4A4640;
      --mauve:            #E2C6FD;
      --mauve-dark:       #C9A4E8;
      --warm-gray:        #B8B2A8;
      --warm-gray-light:  #E8E3DB;
      --shadow:           3px 3px 0px 0px #2D2A26;
      --shadow-lg:        4px 4px 0px 0px #2D2A26;
      --shadow-pressed:   1px 1px 0px 0px #2D2A26;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--warm-dark);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      line-height: 1.12;
    }

    .coming-soon {
      text-align: center;
      max-width: 560px;
    }

    .logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.5px;
      margin-bottom: 48px;
    }

    .pill {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      border: 1.5px solid var(--warm-gray-light);
      font-size: 13px;
      font-weight: 500;
      color: var(--warm-dark-light);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: var(--warm-dark-light);
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 34px;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 17px;
      text-decoration: none;
      border: 2px solid var(--warm-dark);
      cursor: pointer;
      transition: box-shadow 0.12s ease, transform 0.12s ease;
      background: var(--mauve);
      color: var(--warm-dark);
      box-shadow: var(--shadow-lg);
    }
    .btn:hover {
      box-shadow: var(--shadow-pressed);
      transform: translate(3px, 3px);
    }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 13px;
      color: var(--warm-gray);
    }
  </style>
</head>
<body>

  <div class="coming-soon">
    <div class="logo">unsnag</div>
    <span class="pill" style="background: #FF6B4C; color: white; border-color: #FF6B4C;">Coming soon</span>
    <h1>Something is<br>on its way.</h1>
    <p class="subtitle">A guided emotional processing app that helps you actually move through what you're feeling — not just think about it. We're putting the finishing touches on things.</p>
    <a href="https://app.unsnag.co/signup" class="btn">Start your free trial</a>
  </div>

  <footer>&copy; 2025 unsnag. All rights reserved.</footer>

</body>
</html>
