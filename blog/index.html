  <style>
    :root {
      --cream: #FAF7F2;
      --cream-dark: #F0EBE3;
      --warm-dark: #2D2A26;
      --warm-dark-light: #4A4640;
      --mauve: #E2C6FD;
      --mauve-dark: #C9A4E8;
      --mauve-light: #F0DEFF;
      --blush: #FFBCF2;
      --orange: #FFA846;
      --tomato: #FF6B4C;
      --warm-gray: #B8B2A8;
      --warm-gray-light: #E8E3DB;
      --shadow: 3px 3px 0px 0px #2D2A26;
      --shadow-sm: 2px 2px 0px 0px #2D2A26;
      --shadow-lg: 4px 4px 0px 0px #2D2A26;
      --shadow-pressed: 1px 1px 0px 0px #2D2A26;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--warm-dark);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      line-height: 1.15;
    }
    a { color: inherit; }

    /* Nav */
    #main-nav {
      position: sticky; top: 0; z-index: 100;
      padding: 16px 0;
      background: rgba(250, 247, 242, 0.94);
      border-bottom: 1.5px solid var(--warm-gray-light);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #main-nav .container {
      display: flex; justify-content: center; align-items: center; justify-content: space-between; gap: 24px;
    }
    .nav-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 22px; color: var(--warm-dark);
      text-decoration: none; letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex; justify-content: center; align-items: center; gap: 32px; list-style: none;
    }
    .nav-links a {
      font-size: 15px; font-weight: 500; color: var(--warm-dark-light);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--warm-dark); }
    .nav-links a.active {
      color: var(--warm-dark); font-weight: 700;
      text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1.5px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 13px 26px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px;
      text-decoration: none; border: 2px solid var(--warm-dark);
      cursor: pointer; transition: box-shadow 0.12s ease, transform 0.12s ease;
    }
    .btn-mauve {
      background: var(--mauve); color: var(--warm-dark); box-shadow: var(--shadow);
    }
    .btn-mauve:hover {
      box-shadow: var(--shadow-pressed); transform: translate(2px, 2px);
    }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 48px; }

    /* Blog header */
    .blog-header {
      padding: 72px 0 48px;
      text-align: center;
    }
    .blog-header h1 {
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    .blog-header p {
      font-size: 17px;
      color: var(--warm-dark-light);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Post cards */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      padding-bottom: 80px;
    }
    .post-card {
      background: var(--cream-dark);
      border: 2px solid var(--warm-dark);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px 28px;
      display: flex; justify-content: center;
      flex-direction: column;
      gap: 14px;
      text-decoration: none;
      transition: box-shadow 0.12s, transform 0.12s;
    }
    .post-card:hover {
      box-shadow: var(--shadow-pressed);
      transform: translate(2px, 2px);
    }
    .post-card-meta {
      display: flex; justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .post-card-tag {
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      border: 1.5px solid var(--warm-dark);
      box-shadow: var(--shadow-sm);
    }
    .post-card-date {
      font-size: 12px;
      color: var(--warm-gray);
      font-weight: 500;
    }
    .post-card h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.25;
    }
    .post-card p {
      font-size: 15px;
      color: var(--warm-dark-light);
      line-height: 1.65;
      flex: 1;
    }
    /* Tag filters */
    .tag-filters {
      display: flex; justify-content: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .tag-filter {
      padding: 6px 16px;
      border-radius: 100px;
      border: 2px solid var(--warm-gray-light);
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--warm-dark-light);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .tag-filter:hover {
      border-color: var(--warm-dark);
      color: var(--warm-dark);
    }
    .tag-filter.active {
      border-color: var(--warm-dark);
      color: var(--warm-dark);
      box-shadow: var(--shadow-sm);
    }
    .tag-filter[data-tag="Feelings"].active { background: var(--mauve); }
    .tag-filter[data-tag="Patterns"].active { background: var(--tomato); color: white; }
    .tag-filter[data-tag="Identity"].active { background: var(--orange); }
    .tag-filter[data-tag="Unsnag"].active { background: var(--blush); }

    .post-card.hidden { display: none; }

    .post-card-read {
      font-size: 14px;
      font-weight: 600;
      color: var(--mauve-dark);
      display: flex; justify-content: center;
      align-items: center;
      gap: 4px;
    }

    /* Footer */
    footer {
      background: var(--cream-dark); padding: 36px 0;
      border-top: 1.5px solid var(--warm-gray-light);
    }
    .footer-inner {
      display: flex; justify-content: center; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800; font-size: 20px; color: var(--warm-dark); text-decoration: none;
    }
    .footer-links { display: flex; justify-content: center; gap: 24px; list-style: none; flex-wrap: wrap; }
    .footer-links a {
      font-size: 14px; font-weight: 500; color: var(--warm-dark-light);
      text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--warm-dark); }
    .footer-copy { font-size: 13px; color: var(--warm-gray); }

    @media (max-width: 860px) {
      .container { padding: 0 24px; }
      .posts-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .blog-header { padding: 48px 0 32px; }
    }
  </style>

<body>

<nav id="main-nav">
  <div class="container">
    <a href="/" class="nav-logo">unsnag</a>
    <ul class="nav-links">
      <li><a href="/yours">Yours or Not</a></li>

    <div class="nav-cta-desktop" style="display: flex; align-items: center; gap: 20px;">
      <a href="https://app.unsnag.co" style="font-size: 15px; font-weight: 500; color: var(--warm-dark-light); text-decoration: none; transition: color 0.2s;">Log in</a>
      <a href="https://app.unsnag.co/signup" class="btn btn-mauve">Start free trial</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="blog-header">
    <h1>The Unsnag Blog</h1>
    <p>Feelings, patterns, and what it actually takes to stop overthinking and start living differently.</p>
  </div>

  <div class="tag-filters">
    <button class="tag-filter" data-tag="All">All</button>
    <button class="tag-filter" data-tag="Feelings">Feelings</button>
    <button class="tag-filter" data-tag="Patterns">Patterns</button>
    <button class="tag-filter" data-tag="Identity">Identity</button>
    <button class="tag-filter" data-tag="Unsnag">Unsnag</button>
  </div>

  <div class="posts-grid" id="postsGrid">
    <div style="text-align:center;padding:40px;color:var(--warm-gray);">Loading posts...</div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <a href="/" class="footer-logo">unsnag</a>
      <ul class="footer-links">
        <li><a href="/yours">Yours or Not</a></li>

        <li><a href="/privacy.html">Privacy</a></li>
        <li><a href="/terms.html">Terms</a></li>
      </ul>
      <span class="footer-copy">&copy; 2026 Unsnag</span>
    </div>
  </div>
</footer>

<script>
  const SUPABASE_URL = 'https://ipefugguprpjjfmeoexj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwZWZ1Z2d1cHJwampmbWVvZXhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODQxMTIsImV4cCI6MjA4OTg2MDExMn0.yLzTE0VVqd7wmYYVP3l62JcZ6eaCMu0WHizvoUf5Uzo';

  const TAG_STYLES = {
    Feelings: 'background: var(--mauve);',
    Patterns: 'background: var(--tomato); color: white;',
    Identity: 'background: var(--orange);',
    Unsnag: 'background: var(--blush);',
  };

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function renderCard(post) {
    const style = TAG_STYLES[post.tag] || 'background: var(--mauve);';
    return `<a href="${post.slug}.html" class="post-card" data-tag="${post.tag}">
      <div class="post-card-meta">
        <span class="post-card-tag" style="${style}">${post.tag}</span>
        <span class="post-card-date">${formatDate(post.published_date)}</span>
      </div>
      <h2>${post.title}</h2>
      <p>${post.excerpt}</p>
      <span class="post-card-read">Read →</span>
    </a>`;
  }

  // Fetch published posts from Supabase
  async function loadPosts() {
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/blog_posts?published=eq.true&order=published_date.desc',
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          }
        }
      );
      const posts = await res.json();
      const grid = document.getElementById('postsGrid');

      if (posts.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--warm-gray);">No posts yet.</div>';
        return;
      }

      grid.innerHTML = posts.map(renderCard).join('\n');
      initFilters();
    } catch (e) {
      console.error('Failed to load posts:', e);
      document.getElementById('postsGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--warm-gray);">Failed to load posts.</div>';
    }
  }

  // Tag filters
  let activeTag = 'All';
  function initFilters() {
    const filters = document.querySelectorAll('.tag-filter');
    filters.forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        activeTag = (tag === activeTag && tag !== 'All') ? 'All' : tag;
        filters.forEach(f => f.classList.toggle('active', f.dataset.tag === activeTag));
        document.querySelectorAll('.post-card').forEach(card => {
          card.classList.toggle('hidden', activeTag !== 'All' && card.dataset.tag !== activeTag);
        });
      });
    });
  }

  loadPosts();
</script>
</body>
